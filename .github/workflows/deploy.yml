name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages on every push to main.
# Pages "Source" must be set to "GitHub Actions" (done once via the gh API at setup).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege tokens required by the Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # withastro/action: detects the package manager, runs install + `astro build`,
      # and uploads ./dist as the Pages artifact. `base` comes from astro.config.mjs.
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
